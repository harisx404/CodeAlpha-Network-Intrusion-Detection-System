version: "3.9"

services:
  suricata:
    build:
      context: .
      dockerfile: docker/Dockerfile.suricata
    container_name: nids-suricata
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - suricata_logs:/var/log/suricata
    environment:
      - SURICATA_INTERFACE=${SURICATA_INTERFACE:-lo}

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: nids-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - suricata_logs:/var/log/suricata:ro
      - ./database:/app/database
      - ./logs:/app/logs
      - ./suricata/rules:/app/rules:ro
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: nids-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # In Docker: nginx proxies /api/ to backend, so frontend uses relative URL
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost/ws/events
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: nids-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  suricata_logs:
