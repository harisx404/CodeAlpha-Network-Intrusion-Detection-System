# Note: pytest configuration lives in the repository-root pytest.ini so that
# it is picked up when CI runs `pytest tests/backend/` from the repo root.

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
