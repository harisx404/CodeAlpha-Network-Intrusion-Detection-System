# docker-compose.override.yml — LOCAL DEVELOPMENT ONLY
#
# This file is automatically merged with docker-compose.yml when you run
# `docker compose up` locally. It bind-mounts source code so your changes
# are reflected without rebuilding images.
#
# DO NOT commit this file if you have local secrets or machine-specific paths.
# It is already in .gitignore.

services:
  backend:
    volumes:
      # Mount live source so edits take effect without `docker compose build`
      - ./backend:/app/backend
    environment:
      - APP_ENV=development
      - DEBUG=true

  frontend:
    volumes:
      # Mount the local Next.js build output so the latest UI is served
      - ./frontend/.next:/app/.next
      - ./frontend/public:/app/public
