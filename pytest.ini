[pytest]
asyncio_mode = auto
testpaths = tests/backend
# Use importlib import mode so the tests/backend package does not shadow the
# real `backend` application package on sys.path (conftest handles path setup).
addopts = --import-mode=importlib
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings = ignore::DeprecationWarning
